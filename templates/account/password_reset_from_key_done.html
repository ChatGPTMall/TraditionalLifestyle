<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password Changed | TraditionalLifestyle</title>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,400&family=Montserrat:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">

    <!-- GSAP -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.4/gsap.min.js"></script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #1a1a1a 0%, #0d0d0d 100%);
            position: relative;
        }

        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: radial-gradient(ellipse at center, rgba(39, 174, 96, 0.1) 0%, transparent 60%);
            pointer-events: none;
        }

        .success-container {
            width: 100%;
            max-width: 420px;
            padding: 3rem 2rem;
            text-align: center;
            position: relative;
            z-index: 1;
        }

        .success-brand {
            font-family: 'Playfair Display', serif;
            font-size: 1.5rem;
            font-style: italic;
            color: #d4af37;
            margin-bottom: 2.5rem;
            opacity: 0;
        }

        .success-icon {
            width: 100px;
            height: 100px;
            margin: 0 auto 1.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(39, 174, 96, 0.1);
            border: 2px solid rgba(39, 174, 96, 0.3);
            border-radius: 50%;
            opacity: 0;
            transform: scale(0.5);
        }

        .success-icon svg {
            width: 50px;
            height: 50px;
            color: #27ae60;
        }

        .checkmark {
            stroke-dasharray: 100;
            stroke-dashoffset: 100;
        }

        .success-title {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 2.2rem;
            font-weight: 400;
            letter-spacing: 0.1em;
            color: #ffffff;
            margin-bottom: 1rem;
            opacity: 0;
            transform: translateY(20px);
        }

        .success-message {
            font-size: 0.95rem;
            color: rgba(255, 255, 255, 0.6);
            line-height: 1.7;
            margin-bottom: 2rem;
            opacity: 0;
            transform: translateY(20px);
        }

        .btn-login {
            display: inline-block;
            padding: 1rem 3rem;
            font-family: 'Montserrat', sans-serif;
            font-size: 0.8rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.2em;
            color: #0d0d0d;
            background: linear-gradient(135deg, #d4af37 0%, #f4d03f 50%, #d4af37 100%);
            background-size: 200% 200%;
            border: none;
            border-radius: 4px;
            text-decoration: none;
            transition: all 0.4s ease;
            opacity: 0;
            transform: translateY(20px);
        }

        .btn-login:hover {
            background-position: 100% 0;
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(212, 175, 55, 0.3);
        }
    </style>
</head>
<body>
    <div class="success-container">
        <div class="success-brand">TraditionalLifestyle</div>

        <div class="success-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path class="checkmark" d="M20 6L9 17l-5-5"/>
            </svg>
        </div>

        <h1 class="success-title">Password Changed!</h1>
        <p class="success-message">
            Your password has been successfully reset.<br>
            You can now sign in with your new password.
        </p>

        <a href="{% url 'account_login' %}" class="btn-login">Sign In Now</a>
    </div>

    <script>
        const tl = gsap.timeline({ defaults: { ease: 'power3.out' } });

        tl.to('.success-brand', { opacity: 1, duration: 0.6 })
          .to('.success-icon', { opacity: 1, scale: 1, duration: 0.5 }, '-=0.3')
          .to('.checkmark', { strokeDashoffset: 0, duration: 0.6, ease: 'power2.out' }, '-=0.2')
          .to('.success-title', { opacity: 1, y: 0, duration: 0.5 }, '-=0.3')
          .to('.success-message', { opacity: 1, y: 0, duration: 0.5 }, '-=0.3')
          .to('.btn-login', { opacity: 1, y: 0, duration: 0.5 }, '-=0.3');
    </script>
</body>
</html>
