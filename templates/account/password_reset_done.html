<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Check Your Email | TraditionalLifestyle</title>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,400&family=Montserrat:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">

    <!-- GSAP -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.4/gsap.min.js"></script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #1a1a1a 0%, #0d0d0d 100%);
            position: relative;
            overflow: hidden;
        }

        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: radial-gradient(ellipse at center, rgba(39, 174, 96, 0.1) 0%, transparent 60%);
            pointer-events: none;
        }

        .success-container {
            width: 100%;
            max-width: 450px;
            padding: 3rem 2rem;
            text-align: center;
            position: relative;
            z-index: 1;
        }

        .success-brand {
            font-family: 'Playfair Display', serif;
            font-size: 1.5rem;
            font-style: italic;
            color: #d4af37;
            margin-bottom: 2.5rem;
            opacity: 0;
        }

        .success-icon {
            width: 90px;
            height: 90px;
            margin: 0 auto 1.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px solid rgba(39, 174, 96, 0.4);
            border-radius: 50%;
            opacity: 0;
            transform: scale(0.5);
        }

        .success-icon svg {
            width: 45px;
            height: 45px;
            color: #27ae60;
        }

        .success-title {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 2.2rem;
            font-weight: 400;
            letter-spacing: 0.1em;
            color: #ffffff;
            margin-bottom: 1rem;
            opacity: 0;
            transform: translateY(20px);
        }

        .success-message {
            font-size: 0.95rem;
            color: rgba(255, 255, 255, 0.6);
            line-height: 1.7;
            margin-bottom: 2rem;
            opacity: 0;
            transform: translateY(20px);
        }

        .success-tip {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            padding: 1.25rem;
            margin-bottom: 2rem;
            opacity: 0;
            transform: translateY(20px);
        }

        .success-tip p {
            font-size: 0.85rem;
            color: rgba(255, 255, 255, 0.5);
            line-height: 1.6;
        }

        .success-tip strong {
            color: rgba(255, 255, 255, 0.7);
        }

        .btn-back {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.9rem 2rem;
            font-family: 'Montserrat', sans-serif;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            color: #0d0d0d;
            background: linear-gradient(135deg, #d4af37 0%, #f4d03f 50%, #d4af37 100%);
            background-size: 200% 200%;
            border: none;
            border-radius: 4px;
            text-decoration: none;
            transition: all 0.4s ease;
            opacity: 0;
            transform: translateY(20px);
        }

        .btn-back:hover {
            background-position: 100% 0;
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(212, 175, 55, 0.3);
        }

        .btn-back svg {
            width: 16px;
            height: 16px;
        }
    </style>
</head>
<body>
    <div class="success-container">
        <div class="success-brand">TraditionalLifestyle</div>

        <div class="success-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
                <polyline points="22,6 12,13 2,6"/>
            </svg>
        </div>

        <h1 class="success-title">Check Your Email</h1>
        <p class="success-message">
            We've sent password reset instructions to your email address.
            Please check your inbox and follow the link to reset your password.
        </p>

        <div class="success-tip">
            <p>
                <strong>Didn't receive the email?</strong><br>
                Check your spam folder or make sure you entered the correct email address.
            </p>
        </div>

        <a href="{% url 'account_login' %}" class="btn-back">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M19 12H5M12 19l-7-7 7-7"/>
            </svg>
            Back to Login
        </a>
    </div>

    <script>
        const tl = gsap.timeline({ defaults: { ease: 'power3.out' } });

        tl.to('.success-brand', { opacity: 1, duration: 0.6 })
          .to('.success-icon', { opacity: 1, scale: 1, duration: 0.6 }, '-=0.3')
          .to('.success-title', { opacity: 1, y: 0, duration: 0.5 }, '-=0.3')
          .to('.success-message', { opacity: 1, y: 0, duration: 0.5 }, '-=0.3')
          .to('.success-tip', { opacity: 1, y: 0, duration: 0.5 }, '-=0.3')
          .to('.btn-back', { opacity: 1, y: 0, duration: 0.5 }, '-=0.3');
    </script>
</body>
</html>
